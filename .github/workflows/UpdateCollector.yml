name: Update Collector
permissions:
  contents: write
on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/43 * * * *"
  workflow_dispatch:

env:
  ACTIONS_STEP_DEBUG: true  

jobs:
  update-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code (sparse with all txt)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            Files/
            Splitted-By-Protocol/
            Splitted-By-Country/
            Base64/
            *.txt
            aggregator
          sparse-checkout-cone-mode: false

      - name: Set up Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: |
          echo "Pulling latest changes from origin main..."
          git fetch origin main
          git rebase origin/main || { 
            echo "Rebase failed, attempting merge..."; 
            git rebase --abort; 
            git merge origin/main || { 
              echo "Merge failed, resetting to origin/main..."; 
              git reset --hard origin/main; 
            }; 
          }
          echo "Branch is up-to-date with origin/main"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: Files/go.mod

      - name: Debug - Files before aggregator
        run: |
          echo "=== BEFORE AGGREGATOR ==="
          echo "Root TXT: $(ls -la *.txt 2>/dev/null || echo 'None')"
          echo "Files/ TXT: $(ls -la Files/*.txt 2>/dev/null || echo 'None')"
          echo "Directories: $(ls -la | grep '^d' | head -5)"

      - name: Build and run Go aggregator
        run: |
          echo "Building in Files/, running in ROOT..."
          cd Files
          go mod tidy
          go build -ldflags="-s -w" -o ../aggregator *.go
          cd ..  
          pwd  
          echo "Running aggregator in $(pwd)..."
          start_time=$(date +%s)
          ./aggregator || { echo "Aggregator failed"; exit 1; }
          end_time=$(date +%s)
          processing_time=$((end_time - start_time))
          echo "Aggregator done in $processing_times!"
          echo "PROCESSING_TIME=$processing_time" >> $GITHUB_ENV
          rm -f aggregator

      - name: Debug - Files after aggregator + Move if in Files/
        run: |
          echo "=== AFTER AGGREGATOR ==="
          echo "Root TXT: $(ls -la Sub*.txt All_Configs_Sub.txt 2>/dev/null || echo 'None in root!')"
          echo "All root TXT: $(ls -la *.txt 2>/dev/null || echo 'No TXT in root')"
          echo "Files/ TXT: $(ls -la Files/Sub*.txt Files/All_Configs_Sub.txt 2>/dev/null || echo 'None in Files/')"
          
          if [ -f "Files/Sub*.txt" ] || [ -f "Files/All_Configs_Sub.txt" ]; then
            echo "Moving Sub/All from Files/ to root..."
            mv Files/Sub*.txt . 2>/dev/null || true
            mv Files/All_Configs_Sub.txt . 2>/dev/null || true
            echo "Moved! Now root TXT: $(ls -la Sub*.txt All_Configs_Sub.txt 2>/dev/null || echo 'Still none')"
          fi
          
          echo "Final root TXT: $(ls -la Sub*.txt All_Configs_Sub.txt 2>/dev/null || echo 'CRITICAL: Still missing! Check aggregator code')"

      - name: Verify output files
        run: |
          echo "Verifying in root..."
          echo "Sub files:"
          ls -la Sub*.txt All_Configs_Sub.txt 2>/dev/null || echo "CRITICAL: No Sub/All in root - aggregator issue?"

          echo "\nProtocol:"
          ls -la Splitted-By-Protocol/ 2>/dev/null || echo "No protocol dir"

          echo "\nCountry:"
          ls -la Splitted-By-Country/ 2>/dev/null || echo "No country dir"

          echo "\nBase64:"
          ls -la Base64/ 2>/dev/null || echo "No base64 dir"

          if [ -f "All_Configs_Sub.txt" ]; then
            count=$(grep -v '^#' "All_Configs_Sub.txt" | wc -l)
            size=$(du -h "All_Configs_Sub.txt" | cut -f1)
            echo "All_Configs_Sub: $count configs ($size)"
          else
            echo "ERROR: All_Configs_Sub.txt MISSING!"
          fi

          if [ -d "Splitted-By-Protocol" ]; then
            echo "\nProtocol stats:"
            for f in Splitted-By-Protocol/*.txt; do [ -f "$f" ] && echo "$(basename $f): $(grep -v '^#' "$f" | wc -l) configs"; done
          fi

          if [ -d "Splitted-By-Country" ]; then
            echo "\nCountry stats:"
            for f in Splitted-By-Country/*.txt; do [ -f "$f" ] && echo "$(basename $f): $(grep -v '^#' "$f" | wc -l) configs"; done
          fi

      - name: Handle large files and prepare for commit
        run: |
          echo "Handling large files in root..."

          handle_large_file() {
            local file="$1"
            local prefix="$2"
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || echo 0)
              size_mb=$((size / 1024 / 1024))
              echo "File $file: ${size_mb}MB"
              if [ $size_mb -gt 85 ]; then
                echo "Splitting $file..."
                split -b 85M "$file" "${prefix}_part_"
                rm "$file"
              fi
            fi
          }

          # Explicit for Sub and All
          for sub in Sub*.txt; do [ -f "$sub" ] && handle_large_file "$sub" "${sub%.txt}"; done
          [ -f "All_Configs_Sub.txt" ] && handle_large_file "All_Configs_Sub.txt" "All_Configs_Sub"

          # Folders
          find Base64 Splitted-By-Protocol Splitted-By-Country -name "*.txt" -type f | while read f; do
            prefix=$(basename "$f" .txt)
            handle_large_file "$f" "$f"
          done

      - name: Clean up temporary files
        run: |
          rm -f All_Configs_Sorted.txt All_Configs_base64_Sub.txt

      - name: Debug - Before commit
        run: |
          echo "=== GIT STATUS ==="
          git status --porcelain | head -15 || echo "No changes"
          echo "Sub/All for commit: $(ls Sub*.txt All_Configs_Sub.txt 2>/dev/null || echo 'None!')"

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v10
        with:
          author_name: "GitHub Actions"
          author_email: "github-actions[bot]@users.noreply.github.com"
          message: "🏴‍☠️ Fresh Update "
          add: "."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
